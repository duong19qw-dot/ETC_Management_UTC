<!DOCTYPE html><html lang="vi"><head>
    <title>Mô Phỏng Trạm Thu Phí ETC - UTC</title>
    <meta charset="utf-8">
    <style>
        :root { --main: #00558d; --success: #27ae60; --error: #e74c3c; }
        body { font-family: 'Segoe UI', Arial; background: #eceff1; margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .road { width: 100%; max-width: 800px; height: 150px; background: #333; position: relative; overflow: hidden; border-top: 4px dashed #fff; border-bottom: 4px dashed #fff; margin-bottom: 20px; border-radius: 10px; }
        .barie { position: absolute; right: 150px; bottom: 0; width: 15px; height: 100px; background: #f39c12; transform-origin: bottom; transition: 0.5s; z-index: 10; border: 2px solid #000; }
        .barie.up { transform: rotate(90deg); }
        .car { position: absolute; left: -100px; bottom: 20px; font-size: 50px; transition: 1s; z-index: 5; }
        .panel { background: white; width: 100%; max-width: 600px; padding: 20px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); text-align: center; }
        input { padding: 12px; width: 60%; font-size: 20px; border-radius: 8px; border: 2px solid #ddd; text-align: center; font-weight: bold; }
        button { padding: 12px 20px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; margin: 5px; color: white; }
        #result { margin-top: 15px; padding: 15px; border-radius: 8px; font-weight: bold; min-height: 40px; }
        .open { background: #d4edda; color: #155724; }
        .stop { background: #f8d7da; color: #721c24; }
        table { width: 100%; max-width: 600px; margin-top: 20px; background: white; border-collapse: collapse; border-radius: 10px; overflow: hidden; }
        th, td { padding: 10px; border-bottom: 1px solid #eee; text-align: center; }
    </style>
</head><body>
    <h1 style="color: var(--main);">HỆ THỐNG MÔ PHỎNG ITS - UTC</h1>
    <div class="road">
        <div id="barieArm" class="barie"></div>
        <div id="carIcon" class="car">🚗</div>
        <div style="position: absolute; right: 140px; top: 20px; color: white; border: 2px solid red; padding: 5px;">LÀN ETC</div>
    </div>
    <div class="panel">
        <input type="text" id="bienSo" value="29A-11111">
        <div>
            <button style="background: var(--main)" onclick="runProcess()">QUÉT THỦ CÔNG</button>
            <button id="btnAuto" style="background: #8e44ad" onclick="toggleAuto()">TỰ ĐỘNG: OFF</button>
        </div>
        <div id="result">Nhập biển số để kiểm tra</div>
    </div>
    <table>
        <thead><tr><th>Biển Số</th><th>Thời Gian</th><th>Kết Quả</th></tr></thead>
        <tbody id="historyBody"></tbody>
    </table>

    <script>
        // Data 20 xe của Dương đây nhé
        const dbXe = {
            '29A-11111': {ten: 'Dương đẹp trai UTC', du: 500000}, '30F-88888': {ten: 'Tuấn Đại Gia', du: 2000000},
            '51G-67890': {ten: 'Xuân ITS', du: 400000}, '15A-55555': {ten: 'Hải Phòng là nhà', du: 900000},
            '43B-12345': {ten: 'Đà Nẵng vẫy gọi', du: 1500000}, '36A-33333': {ten: 'Thanh Hóa choa', du: 300000},
            '14C-44444': {ten: 'Quảng Ninh Than', du: 2500000}, '17A-77777': {ten: 'Thái Bình mồ hôi rơi', du: 200000},
            '98A-66666': {ten: 'Bắc Giang vải thiều', du: 100000}, '37A-99999': {ten: 'Nghệ An cá gỗ', du: 600000},
            '19B-22222': {ten: 'Phú Thọ Đất Tổ', du: 850000}, '20A-11223': {ten: 'Thái Nguyên trà xanh', du: 450000},
            '34B-44556': {ten: 'Hải Dương bánh đậu', du: 300000}, '18A-99887': {ten: 'Nam Định phở bò', du: 700000},
            '21A-00001': {ten: 'Yên Bái mây ngàn', du: 120000},
            '34A-22222': {ten: 'Hùng xe ôm nghèo', du: 15000}, '17B-33333': {ten: 'Cường chạy Grab', du: 5000},
            '99C-88888': {ten: 'Bác lái xe tải hết tiền', du: 20000}, '29H-44444': {ten: 'Shipper vượt khó', du: 12000},
            '30A-00000': {ten: 'Xe sinh viên thực tập', du: 2000}
        };

        let isAuto = false, autoInterval;

        async function runProcess() {
            const bs = document.getElementById('bienSo').value.trim();
            const car = document.getElementById('carIcon'), barie = document.getElementById('barieArm'), resDiv = document.getElementById('result');
            
            car.style.left = "450px";
            resDiv.innerHTML = "🔍 Đang check biển số..."; resDiv.className = "";
            await new Promise(r => setTimeout(r, 800));

            const xe = dbXe[bs];
            if (xe && xe.du >= 25000) { // Giả sử phí là 25k
                barie.classList.add('up');
                resDiv.className = "open";
                resDiv.innerHTML = `✅ MỜI QUA: ${xe.ten} (-25.000đ)`;
                setTimeout(() => { car.style.left = "900px"; }, 500);
                updateHistory(bs, "Thành công");
            } else {
                resDiv.className = "stop";
                resDiv.innerHTML = xe ? `❌ HẾT TIỀN: ${xe.ten}` : "❌ XE CHƯA ĐĂNG KÝ ETC";
                setTimeout(() => { car.style.left = "-100px"; }, 500);
                updateHistory(bs, "Bị chặn");
            }

            setTimeout(() => { barie.classList.remove('up'); if (car.style.left === "900px") car.style.left = "-100px"; }, 2500);
        }

        function toggleAuto() {
            isAuto = !isAuto;
            const btn = document.getElementById('btnAuto');
            btn.innerHTML = isAuto ? "TỰ ĐỘNG: ON" : "TỰ ĐỘNG: OFF";
            btn.style.background = isAuto ? "#27ae60" : "#8e44ad";
            if (isAuto) autoInterval = setInterval(() => {
                const keys = Object.keys(dbXe);
                document.getElementById('bienSo').value = keys[Math.floor(Math.random() * keys.length)];
                runProcess();
            }, 5000);
            else clearInterval(autoInterval);
        }

        function updateHistory(bs, status) {
            const body = document.getElementById('historyBody');
            const row = body.insertRow(0);
            row.innerHTML = `<td><b>${bs}</b></td><td>${new Date().toLocaleTimeString()}</td><td>${status}</td>`;
            if (body.rows.length > 5) body.deleteRow(5);
        }
    </script>
</body></html>
